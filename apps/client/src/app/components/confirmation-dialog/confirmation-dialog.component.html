<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <p>{{ message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-flat-button type="button" class="confirmation-dialog__confirm" (click)="confirm()">
    {{ confirmLabel }}
  </button>
</mat-dialog-actions>
