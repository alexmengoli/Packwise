<h2 mat-dialog-title>{{ isEditing ? 'Edit activity' : 'New activity' }}</h2>

<mat-dialog-content>
  <form class="details-form" [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Activity name</mat-label>
      <input matInput formControlName="name" autocomplete="off" />
      @if (form.controls.name.hasError('required')) {
        <mat-error>Activity name is required.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3"></textarea>
    </mat-form-field>

    <div class="picker-group">
      <span class="picker-group__label">Icon</span>
      <div class="icon-picker" aria-label="Activity icon">
        @for (icon of activityIcons; track icon) {
          <button
            mat-icon-button
            type="button"
            class="icon-picker__option"
            [class.icon-picker__option--selected]="form.controls.icon.value === icon"
            [attr.aria-label]="'Use ' + icon + ' icon'"
            [attr.aria-pressed]="form.controls.icon.value === icon"
            [title]="icon"
            (click)="selectIcon(icon)"
          >
            <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
          </button>
        }
      </div>
    </div>

    <div class="picker-group">
      <span class="picker-group__label">Color</span>
      <div class="color-picker" [style.--selected-color]="hslColor(form.controls.hue.value)">
        <span class="color-picker__preview" aria-hidden="true"></span>
        <label class="color-picker__slider">
          <span class="color-picker__value">Color tone {{ form.controls.hue.value }}</span>
          <input
            type="range"
            min="0"
            max="359"
            step="1"
            [value]="form.controls.hue.value"
            (input)="updateHue($event)"
          />
        </label>
      </div>

      <div class="swatch-picker" aria-label="Activity color">
        @for (hue of activityHues; track hue) {
          <button
            type="button"
            class="swatch-picker__option"
            [class.swatch-picker__option--selected]="form.controls.hue.value === hue"
            [style.--swatch-color]="hslColor(hue)"
            [attr.aria-label]="'Use hue ' + hue"
            [attr.aria-pressed]="form.controls.hue.value === hue"
            (click)="selectHue(hue)"
          ></button>
        }
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-flat-button type="button" (click)="save()">{{ isEditing ? 'Save changes' : 'Add activity' }}</button>
</mat-dialog-actions>
