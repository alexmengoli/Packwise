<nav mat-tab-nav-bar class="bottom-nav" [tabPanel]="bottomNavPanel" aria-label="Primary">
  <a
    mat-tab-link
    class="bottom-nav__item"
    routerLink="/"
    routerLinkActive
    #packLink="routerLinkActive"
    ariaCurrentWhenActive="page"
    [active]="packLink.isActive"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <mat-icon class="bottom-nav__icon" aria-hidden="true">checklist</mat-icon>
    <span class="bottom-nav__label">Pack</span>
  </a>

  <a
    mat-tab-link
    class="bottom-nav__item"
    routerLink="/library"
    routerLinkActive
    #libraryLink="routerLinkActive"
    ariaCurrentWhenActive="page"
    [active]="libraryLink.isActive"
  >
    <mat-icon class="bottom-nav__icon" aria-hidden="true">inventory_2</mat-icon>
    <span class="bottom-nav__label">Library</span>
  </a>

  <a
    mat-tab-link
    class="bottom-nav__item"
    routerLink="/settings"
    routerLinkActive
    #settingsLink="routerLinkActive"
    ariaCurrentWhenActive="page"
    [active]="settingsLink.isActive"
  >
    <mat-icon class="bottom-nav__icon" aria-hidden="true">settings</mat-icon>
    <span class="bottom-nav__label">Settings</span>
  </a>
</nav>

<mat-tab-nav-panel #bottomNavPanel />

<nav class="desktop-nav" aria-label="Primary">
  <a
    class="desktop-nav__item"
    routerLink="/"
    routerLinkActive="desktop-nav__item--active"
    #desktopPackLink="routerLinkActive"
    ariaCurrentWhenActive="page"
    [routerLinkActiveOptions]="{ exact: true }"
    [attr.aria-label]="desktopPackLink.isActive ? 'Pack, current page' : 'Pack'"
  >
    <mat-icon class="desktop-nav__icon" aria-hidden="true">checklist</mat-icon>
    <span class="desktop-nav__label">Pack</span>
  </a>

  <a
    class="desktop-nav__item"
    routerLink="/library"
    routerLinkActive="desktop-nav__item--active"
    #desktopLibraryLink="routerLinkActive"
    ariaCurrentWhenActive="page"
    [attr.aria-label]="desktopLibraryLink.isActive ? 'Library, current page' : 'Library'"
  >
    <mat-icon class="desktop-nav__icon" aria-hidden="true">inventory_2</mat-icon>
    <span class="desktop-nav__label">Library</span>
  </a>

  <a
    class="desktop-nav__item"
    routerLink="/settings"
    routerLinkActive="desktop-nav__item--active"
    #desktopSettingsLink="routerLinkActive"
    ariaCurrentWhenActive="page"
    [attr.aria-label]="desktopSettingsLink.isActive ? 'Settings, current page' : 'Settings'"
  >
    <mat-icon class="desktop-nav__icon" aria-hidden="true">settings</mat-icon>
    <span class="desktop-nav__label">Settings</span>
  </a>
</nav>
