<span class="duplicate-name-snackbar__message">
  A {{ entityLabel }} named "{{ name }}" already exists.
</span>

<span class="duplicate-name-snackbar__actions">
  <button mat-button type="button" (click)="overwrite()">Replace</button>
  <button mat-button type="button" (click)="openExisting()">Open existing</button>
  <button mat-button type="button" (click)="close()">Keep editing</button>
</span>
